<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — BloodConnect</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-logo">
    <span>🩸</span>
    <h1>Welcome Back</h1>
    <p>Sign in to your BloodConnect account</p>
  </div>

  <div id="alert-box"></div>

  <form id="login-form">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com" required/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div style="position:relative;">
        <input type="password" id="password" class="form-control" placeholder="Your password" required style="padding-right:2.8rem;"/>
        <button type="button" id="toggle-pw" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;">👁</button>
      </div>
    </div>
    <button type="submit" id="login-btn" class="btn btn-primary btn-block btn-lg">Sign In →</button>
  </form>

  <div class="auth-footer mt-2">Don't have an account? <a href="signup.html">Sign up free</a></div>
  <div class="auth-footer mt-1"><a href="index.html">← Back to Home</a></div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>

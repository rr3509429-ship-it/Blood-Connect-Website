<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — BloodConnect</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .admin-login-badge {
      display: inline-block;
      background: #d32f2f;
      color: white;
      font-size: .72rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      letter-spacing: .04em;
      margin-bottom: 8px;
    }
    .admin-lock-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 4px;
    }
    #admin-alert {
      margin-bottom: 14px;
    }
  </style>
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-logo">
    <span class="admin-lock-icon">🔐</span>
    <span class="admin-login-badge">ADMIN ONLY</span>
    <h1 style="margin-top:6px;">Admin Portal</h1>
    <p>BloodConnect System Administration</p>
  </div>

  <div id="admin-alert"></div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="admin-username" class="form-control" placeholder="Enter admin username" autocomplete="off"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <div style="position:relative;">
      <input type="password" id="admin-password" class="form-control" placeholder="Enter admin password" style="padding-right:2.8rem;"/>
      <button type="button" id="toggle-pw" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;">👁</button>
    </div>
  </div>
  <button id="admin-login-btn" class="btn btn-primary btn-block btn-lg">🔐 Login as Admin</button>

  <div class="auth-footer mt-2"><a href="index.html">← Back to Home</a></div>
  <div class="auth-footer mt-1" style="color:#999;font-size:.78rem;">This portal is for system administrators only.</div>
</div>

<script src="js/api.js"></script>
<script>
(function () {
  // If already admin session, go to admin panel
  const sess = getSession();
  if (sess && sess.user && sess.user.role === 'admin') {
    window.location.href = 'admin.html';
    return;
  }

  const usernameEl = document.getElementById('admin-username');
  const passwordEl = document.getElementById('admin-password');
  const btnEl      = document.getElementById('admin-login-btn');
  const alertEl    = document.getElementById('admin-alert');

  function showAlert(msg, type = 'danger') {
    alertEl.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  }

  document.getElementById('toggle-pw').addEventListener('click', () => {
    passwordEl.type = passwordEl.type === 'password' ? 'text' : 'password';
  });

  async function doLogin() {
    const username = usernameEl.value.trim();
    const password = passwordEl.value;
    alertEl.innerHTML = '';

    if (!username || !password) {
      showAlert('⚠️ Please enter username and password.');
      return;
    }

    btnEl.disabled    = true;
    btnEl.textContent = '🔄 Logging in…';

    try {
      const data = await apiRequest('/admin/login', 'POST', { username, password });
      saveSession(data.token, data.user);
      showAlert('✅ Login successful! Redirecting…', 'success');
      setTimeout(() => window.location.href = 'admin.html', 900);
    } catch (err) {
      showAlert(`❌ ${err.message || 'Invalid credentials'}`);
      btnEl.disabled    = false;
      btnEl.textContent = '🔐 Login as Admin';
    }
  }

  btnEl.addEventListener('click', doLogin);
  passwordEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
  usernameEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') passwordEl.focus(); });
})();
</script>
</body>
</html>
